<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #334155, #06b6d4);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* MAIN CARD */
    .card {
      background: white;
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
      text-align: center;
    }

    /* TITLE */
    h1 {
      margin-bottom: 25px;
      color: #334155;
    }

    /* BUTTON COMMON STYLE */
    button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      color: white;
    }

    /* GREEN BUTTON */
    .green-btn {
      background: #16a34a;
    }

    .green-btn:hover {
      background: #15803d;
    }

    /* RED BUTTON */
    .red-btn {
      background: #dc2626;
    }

    .red-btn:hover {
      background: #b91c1c;
    }

    /* RESPONSIVE */
    @media (max-width: 500px) {
      .card {
        margin: 20px;
        padding: 20px;
      }
    }
  </style>

</head>

<body>

<div class="container">

  <div class="card">

    <h1>📊 Admin Dashboard</h1>

    <!-- OPEN SHEET -->
    <button class="green-btn" onclick="openSheet()">
      📂 Open Live Google Sheet
    </button>

    <!-- LOGOUT -->
    <button class="red-btn" onclick="logout()">
      🚪 Logout
    </button>

  </div>

</div>

<script>
function openSheet() {
  window.open(
    "https://docs.google.com/spreadsheets/d/1U6oYPazqIKCYWCJ95tD0z4MA2019FSBBQzpBOEpp_TQ/edit?usp=sharing",
    "_blank"
  );
}

function logout() {
  localStorage.removeItem("admin");
  window.location.href = "login.html";
}

function logout() {
  // admin session remove karo
  localStorage.removeItem("admin");

  // login page pe redirect
  window.location.href = "login.html";
}
</script>

</body>
</html>
