<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astha Agriculture Form</title>
  <link rel="stylesheet" href="style.css">
  <style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f4f6;
}

.container {
  width: 90%;
  margin: auto;
  background: white;
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
  border: 2px solid green;
  padding: 15px;
  border-radius: 10px;
  flex-wrap: wrap;
}

.logo img {
  width: 80px;
  height: 80px;
}

.title {
  text-align: center;
  flex: 1;
}

.title h1 {
  color: green;
  margin: 0;
}

.photo-box {
  width: 140px;
  height: 180px;
  border: 2px dashed gray;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.course-bar {
  background: green;
  color: white;
  padding: 10px;
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  margin-top: 10px;
}

form input, form select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.row {
  display: flex;
  gap: 10px;
}

.table {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.documents {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.doc-box {
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

@media (max-width: 768px) {
  .header {
    flex-direction: column;
    text-align: center;
  }

  .row {
    flex-direction: column;
  }

  .table {
    grid-template-columns: 1fr;
  }

  .documents {
    grid-template-columns: 1fr;
  }

  .course-bar {
    flex-direction: column;
  }
}
.course-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 15px;
  background: #16a34a;
  border-radius: 10px;
  margin: 15px 0;
  color: white;
  justify-content: center;
}

/* HIDE DEFAULT RADIO */
.course-bar input[type="radio"] {
  display: none;
}

/* LABEL AS BUTTON */
.course-bar label {
  padding: 10px 15px;
  background: rgba(255, 255, 255, 0.2);
  border: 1px solid white;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 14px;
}

/* HOVER EFFECT */
.course-bar label:hover {
  background: white;
  color: #16a34a;
}

/* SELECTED STATE */
.course-bar input[type="radio"]:checked + label {
  background: white;
  color: #16a34a;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

 <!-- HEADER / NAVBAR -->
<div class="header">

  <!-- LOGO LEFT -->
  <div class="logo">
    <img src="assets/logo.jpeg" alt="logo">
  </div>

  <!-- CENTER TITLE -->
  <div class="title">
    <h1>ASTHA AGRICULTURE ACADEMY</h1>
    <p>📍 Civil Hospital ke peeche, Madhya Pradesh</p>
  </div>

  <!-- RIGHT PHOTO (UPDATED) -->
  <div class="photo-box">
    <label for="photo">📸 Upload Photo</label>
    <input type="file" id="photo">
  </div>

</div>

  <h2 >📝 STUDENT REGISTRATION FORM</h2>

  <!-- COURSE BAR -->
  <div class="course-bar">

  <input type="radio" id="c1" name="course" value="Agriculture B.Sc">
  <label for="c1">Agriculture B.Sc</label>

  <input type="radio" id="c2" name="course" value="Nursing B.Sc">
  <label for="c2">Nursing B.Sc</label>

  <input type="radio" id="c3" name="course" value="B-Pharma">
  <label for="c3">B-Pharma</label>

  <input type="radio" id="c4" name="course" value="D-Pharma">
  <label for="c4">D-Pharma</label>

  <input type="radio" id="c5" name="course" value="B.Tech">
  <label for="c5">B.Tech</label>

</div>
  <!-- FORM -->
  <form>

    <input type="text" name="name" placeholder="Full Name">
    <input type="text" name="father" placeholder="Father Name">
   <input type="text" name="address" placeholder="Address">

    <div class="row">
      <input type="date" name="dob">
      <select name="category">
        <option>Select Category</option>
        <option>GEN</option>
        <option>OBC</option>
        <option>SC</option>
        <option>ST</option>
      </select>
    </div>

    <div class="row">
      <input type="text" name="mobile" placeholder="Mobile Number">
<input type="text" name="whatsapp" placeholder="WhatsApp Number">

    </div>

   <input type="email" name="email" placeholder="Email">

    <div class="row">
      <input type="text" name="occupation" placeholder="Father Occupation">
      <input type="text" name="fees" placeholder="Fees">
    </div>

<input type="text" name="reference" placeholder="Reference By">
    <!-- EDUCATION -->
    <h3>Education Details</h3>

    <div class="table">
      <input name="tenthBoard" placeholder="10th Board">
<input name="tenthYear" placeholder="10th Year">
<input name="tenthMarks" placeholder="10th Marks">

<input name="twelfthBoard" placeholder="12th Board">
<input name="twelfthYear" placeholder="12th Year">
<input name="twelfthMarks" placeholder="12th Marks">
</div>

    <!-- NEW SECTION: DOCUMENTS -->
<h3>📂 Documents Upload</h3>

<div class="documents">

  <div class="doc-box">
    <label><input type="checkbox"> Aadhaar Card</label>
    <input type="file">
  </div>

  <div class="doc-box">
    <label><input type="checkbox"> Passport Photo</label>
    <input type="file">
  </div>

  <div class="doc-box">
    <label><input type="checkbox"> Marksheet</label>
    <input type="file">
  </div>

  <div class="doc-box">
    <label><input type="checkbox"> TC</label>
    <input type="file">
  </div>

</div>

    <button type="submit">Submit Form</button>

    

  </form>

</div>
<script src="script.js"></script>
</body>
</html>
