<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #1e293b, #06b6d4);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* CARD */
    .card {
      background: white;
      width: 100%;
      max-width: 380px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
      text-align: center;
    }

    /* ICON */
    .icon {
      background: #1e293b;
      color: white;
      width: 70px;
      height: 70px;
      margin: auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    h1 {
      margin-top: 15px;
      color: #1e293b;
    }

    p {
      color: gray;
      margin-bottom: 20px;
    }

    /* FORM */
    form {
      text-align: left;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 10px;
      outline: none;
    }

    input:focus {
      border-color: #06b6d4;
    }

    /* PASSWORD BOX */
    .password-box {
      position: relative;
    }

    .password-box i {
      position: absolute;
      right: 12px;
      top: 14px;
      cursor: pointer;
      color: gray;
    }

    /* ERROR */
    #error {
      color: red;
      font-size: 13px;
      margin-top: 8px;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0f172a;
    }

    /* RESPONSIVE */
    @media (max-width: 500px) {
      .card {
        margin: 20px;
      }
    }
  </style>

</head>

<body>

<div class="container">

  <div class="card">

    <!-- ICON -->
    <div class="icon">
      <i class="fa-solid fa-user-shield"></i>
    </div>

    <!-- TITLE -->
    <h1>Admin Login</h1>
    <p>Welcome Back 👋</p>

    <!-- FORM -->
    <form onsubmit="handleLogin(event)">

      <!-- USERNAME -->
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter Username">

      <!-- PASSWORD -->
      <label>Password</label>

      <div class="password-box">
        <input type="password" id="password" placeholder="Enter Password">
        <i id="toggleEye" class="fa-solid fa-eye" onclick="togglePassword()"></i>
      </div>

      <!-- ERROR -->
      <p id="error"></p>

      <!-- BUTTON -->
      <button type="submit">Login</button>

    </form>

  </div>

</div>

<script>
function handleLogin(event) {
  event.preventDefault();

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const error = document.getElementById("error");

  // SIMPLE LOGIN CHECK (change credentials here)
  if (username === "Anand" && password === "Anand@123") {
    
    // redirect to admin dashboard page
    window.location.href = "admin.html";

  } else {
    error.innerText = "❌ Invalid Username or Password";
  }
}

// PASSWORD SHOW/HIDE
function togglePassword() {
  const password = document.getElementById("password");
  const eye = document.getElementById("toggleEye");

  if (password.type === "password") {
    password.type = "text";
    eye.classList.remove("fa-eye");
    eye.classList.add("fa-eye-slash");
  } else {
    password.type = "password";
    eye.classList.remove("fa-eye-slash");
    eye.classList.add("fa-eye");
  }
}
</script>
</body>
</html>
